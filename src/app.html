<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        try {
          var dark = localStorage.getItem('hueprint-theme') === 'dark';
          window.__HUEPRINT_THEME__ = dark;
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {
          window.__HUEPRINT_THEME__ = false;
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
