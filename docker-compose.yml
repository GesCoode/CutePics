services:
  db:
    image: postgres:16-alpine
    container_name: memlyra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: memlyra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: memlyra
    volumes:
      - memlyra_pg:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - '5432:5432'

  app:
    build: .
    container_name: memlyra
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: postgres://memlyra:${POSTGRES_PASSWORD}@db:5432/memlyra
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - db

volumes:
  memlyra_pg:
